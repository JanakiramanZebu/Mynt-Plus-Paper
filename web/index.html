<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="mynt_plus_testing">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>mynt_plus_testing</title>
  <link rel="manifest" href="manifest.json">
  
  <!-- Tenon Font - Adobe Typekit -->
  <link rel="stylesheet" href="https://use.typekit.net/vkg7qsk.css" crossorigin="anonymous">
  
   <style>
    * {
      font-family: 'tenon', sans-serif !important;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      font-synthesis: weight;
    }
    /* Splash screen styles */
    .splash-container {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff; /* plain white backdrop per design */
      z-index: 9999;
      transition: opacity 200ms ease;
    }
    .splash-container.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .splash-logo {
      width: 76px;
      height: 76px;
      image-rendering: -webkit-optimize-contrast;
      display: block;
    }
    .badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    /* tiny animated bar below the logo */
    .progress-track {
      position: relative;
      width: 36px;
      height: 4px;
      border-radius: 4px;
      background: rgba(30, 102, 255, 0.15);
      overflow: hidden;
    }
    .progress-bar {
      position: absolute;
      left: -30%;
      top: 0;
      height: 100%;
      width: 30%;
      border-radius: 4px;
      background: #1e66ff;
      animation: slide 1.1s ease-in-out infinite;
    }
    @keyframes slide {
      0% { left: -30%; width: 24%; }
      50% { left: 50%; width: 36%; }
      100% { left: 100%; width: 24%; }
    }
  </style> 
  <!-- flutter_inappwebview web support (web plugin path) -->
  <script type="application/javascript" src="/assets/packages/flutter_inappwebview_web/assets/web/web_support.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('firebase-messaging-sw.js');
      });
    }
    // Hide splash once Flutter paints the first frame
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('flutter-splash');
      if (splash) {
        splash.classList.add('hidden');
        // Remove the node after the fade-out
        setTimeout(function(){
          if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
        }, 250);
      }
    });
  </script>
</head>
<body>
  <!-- MYNT splash shown during initialization -->
  <div id="flutter-splash" class="splash-container">
    <div class="badge">
      <img class="splash-logo" src="assets/icon/MYNT_App_Logo_v2.svg" alt="MYNT" />
      <div class="progress-track"><div class="progress-bar"></div></div>
    </div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
