<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="description" content="MYNT Plus - Professional Trading Platform">

  <!-- Performance: Resource hints removed - not using external fonts -->
  
  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MYNT Plus">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>MYNT by Zebu - Invest & Trade</title>
  <link rel="manifest" href="manifest.json">

  <!-- Digilocker OAuth popup callback handler.
       If this page is loaded in a popup with ?code=&state= params,
       send them to the opener window via postMessage and close. -->
  <script>
    (function() {
      if (!window.opener) return;
      var params = new URLSearchParams(window.location.search);
      var code = params.get('code');
      var state = params.get('state');
      var error = params.get('error');
      if (code && state) {
        window.opener.postMessage({ type: 'digilocker_callback', code: code, state: state }, '*');
        window.close();
      } else if (error) {
        window.opener.postMessage({ type: 'digilocker_callback', error: error }, '*');
        window.close();
      }
    })();
  </script>
  
  <style>
    
    * {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      font-synthesis: weight;
    }
    
    /* Ensure Flutter canvas elements can use Geist font */
    canvas, iframe {
      font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    /* Splash screen styles */
    .splash-container {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff; /* plain white backdrop per design */
      z-index: 9999;
      transition: opacity 200ms ease;
    }
    .splash-container.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .splash-logo {
      width: 80px;
      height: 80px;
      image-rendering: -webkit-optimize-contrast;
      display: block;
    }
    .badge {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 90px;
      height: 90px;
    }
    /* Circular spinner around the logo */
    .circular-loader {
      position: absolute;
      width: 90px;
      height: 90px;
      border: 5px solid transparent;
      border-top-color: #2196F3;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  <!-- Razorpay checkout is lazy-loaded from Dart when the user opens payment flow -->
  <!-- flutter_inappwebview web support (web plugin path) -->
  <script type="application/javascript" src="/assets/packages/flutter_inappwebview_web/assets/web/web_support.js"></script>
  <script>
    // Suppress harmless WebSocket/HTTP "Connection" header warning
    // This is a browser security restriction that doesn't affect functionality
    // This error occurs when Flutter's HTTP client tries to set the "Connection" header,
    // which browsers automatically manage for WebSocket upgrades and HTTP requests.
    (function() {
      // Store original console methods
      var originalError = console.error;
      var originalWarn = console.warn;
      
      // Helper function to check if message should be filtered
      function shouldFilterMessage(message) {
        if (!message) return false;
        var msgStr = typeof message === 'string' ? message : 
                     (message.toString ? message.toString() : String(message));
        return msgStr.includes("Refused to set unsafe header") && 
               (msgStr.includes("Connection") || msgStr.includes("'Connection'") || msgStr.includes('"Connection"'));
      }
      
      // Override console.error - check all arguments and stack traces
      console.error = function() {
        var shouldFilter = false;
        for (var i = 0; i < arguments.length; i++) {
          if (shouldFilterMessage(arguments[i])) {
            shouldFilter = true;
            break;
          }
          // Also check stack traces
          if (arguments[i] && arguments[i].stack && shouldFilterMessage(arguments[i].stack)) {
            shouldFilter = true;
            break;
          }
        }
        if (shouldFilter) {
          return; // Silently ignore this specific warning
        }
        // Call original console.error for all other messages
        originalError.apply(console, arguments);
      };
      
      // Override console.warn - check all arguments
      console.warn = function() {
        for (var i = 0; i < arguments.length; i++) {
          if (shouldFilterMessage(arguments[i])) {
            return; // Silently ignore this specific warning
          }
        }
        // Call original console.warn for all other messages
        originalWarn.apply(console, arguments);
      };
      
      // Intercept XMLHttpRequest.setRequestHeader to silently handle Connection header
      var originalSetRequestHeader = XMLHttpRequest.prototype.setRequestHeader;
      XMLHttpRequest.prototype.setRequestHeader = function(header, value) {
        // Silently skip setting the Connection header - browser manages it automatically
        if (header && header.toLowerCase() === 'connection') {
          return; // Don't set the header, but don't throw an error either
        }
        try {
          return originalSetRequestHeader.call(this, header, value);
        } catch (e) {
          // If it's the Connection header error, silently ignore it
          if (e.message && shouldFilterMessage(e.message)) {
            return;
          }
          throw e; // Re-throw other errors
        }
      };
      
      // Catch unhandled errors and promise rejections
      window.addEventListener('error', function(event) {
        if (event.message && shouldFilterMessage(event.message)) {
          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation();
          return false;
        }
      }, true);
      
      // Catch unhandled promise rejections
      window.addEventListener('unhandledrejection', function(event) {
        if (event.reason && shouldFilterMessage(event.reason)) {
          event.preventDefault();
          event.stopPropagation();
          return false;
        }
      });
    })();

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('firebase-messaging-sw.js');
      });
    }
    // Hide splash once Flutter paints the first frame
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('flutter-splash');
      if (splash) {
        splash.classList.add('hidden');
        // Remove the node after the fade-out
        setTimeout(function(){
          if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
        }, 250);
      }
    });
  </script>
  <!-- Digio eSign SDK -->
  <script src="https://app.digio.in/sdk/v11/digio.js"></script>
</head>
<body>
  <!-- MYNT splash shown during initialization -->
  <div id="flutter-splash" class="splash-container">
    <div class="badge">
      <div class="circular-loader"></div>
      <img class="splash-logo" src="/assets/icon/MYNT_App_Logo_v2.svg" alt="MYNT" />
    </div>
  </div>
  <!-- Flutter bootstrap script (auto-generated by flutter build web) -->
  <script src="flutter_bootstrap.js" defer></script>
</body>
</html>
