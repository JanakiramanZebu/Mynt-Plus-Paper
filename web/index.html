<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="description" content="MYNT Plus - Professional Trading Platform">

  <!-- Performance: Resource hints for faster external resource loading -->
  <link rel="preconnect" href="https://use.typekit.net" crossorigin>
  <link rel="dns-prefetch" href="https://use.typekit.net">
  
  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MYNT Plus">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>MYNT by Zebu - Invest & Trade</title>
  <link rel="manifest" href="manifest.json">
  
  <!-- Tenon Font - Adobe Typekit (optimized loading) -->
  <link rel="preload" href="https://use.typekit.net/vkg7qsk.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://use.typekit.net/vkg7qsk.css" crossorigin="anonymous"></noscript>
  
   <style>
    /* Font loading optimization: Use font-display swap for better LCP */
    @font-face {
      font-family: 'tenon';
      font-display: swap; /* Show fallback font immediately, swap when loaded */
    }
    
    * {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      font-synthesis: weight;
    }
    
    /* Ensure Flutter canvas elements can use Geist font */
    canvas, iframe {
      font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    /* Splash screen styles */
    .splash-container {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff; /* plain white backdrop per design */
      z-index: 9999;
      transition: opacity 200ms ease;
    }
    .splash-container.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .splash-logo {
      width: 76px;
      height: 76px;
      image-rendering: -webkit-optimize-contrast;
      display: block;
    }
    .badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    /* tiny animated bar below the logo */
    .progress-track {
      position: relative;
      width: 36px;
      height: 4px;
      border-radius: 4px;
      background: rgba(30, 102, 255, 0.15);
      overflow: hidden;
    }
    .progress-bar {
      position: absolute;
      left: -30%;
      top: 0;
      height: 100%;
      width: 30%;
      border-radius: 4px;
      background: #1e66ff;
      animation: slide 1.1s ease-in-out infinite;
    }
    @keyframes slide {
      0% { left: -30%; width: 24%; }
      50% { left: 50%; width: 36%; }
      100% { left: 100%; width: 24%; }
    }
  </style> 
  <!-- flutter_inappwebview web support (web plugin path) -->
  <script type="application/javascript" src="/assets/packages/flutter_inappwebview_web/assets/web/web_support.js"></script>
  <script>
    // Suppress harmless WebSocket/HTTP "Connection" header warning
    // This is a browser security restriction that doesn't affect functionality
    // This error occurs when Flutter's HTTP client tries to set the "Connection" header,
    // which browsers automatically manage for WebSocket upgrades and HTTP requests.
    (function() {
      // Store original console methods
      var originalError = console.error;
      var originalWarn = console.warn;
      
      // Helper function to check if message should be filtered
      function shouldFilterMessage(message) {
        if (!message) return false;
        var msgStr = typeof message === 'string' ? message : 
                     (message.toString ? message.toString() : String(message));
        return msgStr.includes("Refused to set unsafe header") && 
               (msgStr.includes("Connection") || msgStr.includes("'Connection'") || msgStr.includes('"Connection"'));
      }
      
      // Override console.error - check all arguments and stack traces
      console.error = function() {
        var shouldFilter = false;
        for (var i = 0; i < arguments.length; i++) {
          if (shouldFilterMessage(arguments[i])) {
            shouldFilter = true;
            break;
          }
          // Also check stack traces
          if (arguments[i] && arguments[i].stack && shouldFilterMessage(arguments[i].stack)) {
            shouldFilter = true;
            break;
          }
        }
        if (shouldFilter) {
          return; // Silently ignore this specific warning
        }
        // Call original console.error for all other messages
        originalError.apply(console, arguments);
      };
      
      // Override console.warn - check all arguments
      console.warn = function() {
        for (var i = 0; i < arguments.length; i++) {
          if (shouldFilterMessage(arguments[i])) {
            return; // Silently ignore this specific warning
          }
        }
        // Call original console.warn for all other messages
        originalWarn.apply(console, arguments);
      };
      
      // Intercept XMLHttpRequest.setRequestHeader to silently handle Connection header
      var originalSetRequestHeader = XMLHttpRequest.prototype.setRequestHeader;
      XMLHttpRequest.prototype.setRequestHeader = function(header, value) {
        // Silently skip setting the Connection header - browser manages it automatically
        if (header && header.toLowerCase() === 'connection') {
          return; // Don't set the header, but don't throw an error either
        }
        try {
          return originalSetRequestHeader.call(this, header, value);
        } catch (e) {
          // If it's the Connection header error, silently ignore it
          if (e.message && shouldFilterMessage(e.message)) {
            return;
          }
          throw e; // Re-throw other errors
        }
      };
      
      // Catch unhandled errors and promise rejections
      window.addEventListener('error', function(event) {
        if (event.message && shouldFilterMessage(event.message)) {
          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation();
          return false;
        }
      }, true);
      
      // Catch unhandled promise rejections
      window.addEventListener('unhandledrejection', function(event) {
        if (event.reason && shouldFilterMessage(event.reason)) {
          event.preventDefault();
          event.stopPropagation();
          return false;
        }
      });
    })();

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('firebase-messaging-sw.js');
      });
    }
    // Hide splash once Flutter paints the first frame
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('flutter-splash');
      if (splash) {
        splash.classList.add('hidden');
        // Remove the node after the fade-out
        setTimeout(function(){
          if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
        }, 250);
      }
    });
  </script>
</head>
<body>
  <!-- MYNT splash shown during initialization -->
  <div id="flutter-splash" class="splash-container">
    <div class="badge">
      <img class="splash-logo" src="/assets/icon/MYNT_App_Logo_v2.svg" alt="MYNT" />
      <div class="progress-track"><div class="progress-bar"></div></div>
    </div>
  </div>
  <!-- PERFORMANCE: Configure Flutter web renderer -->
  <script>
    // Use CanvasKit renderer for better performance with complex UIs
    // CanvasKit provides smoother animations and consistent rendering
    window.flutterWebRenderer = "canvaskit";
  </script>
  <!-- Flutter bootstrap: Use defer for better loading order -->
  <script src="flutter_bootstrap.js" defer></script>
</body>
</html>
