<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Digilocker - Processing...</title>
  <style>
    body { display:flex; justify-content:center; align-items:center; height:100vh; margin:0; font-family:sans-serif; background:#f5f5f5; }
    .box { text-align:center; padding:40px; background:#fff; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,.1); }
    .spinner { width:40px; height:40px; border:4px solid #e0e0e0; border-top:4px solid #0037B7; border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 16px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    p { color:#666; font-size:14px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <p id="msg">Processing Digilocker response...</p>
  </div>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var code = params.get('code');
      var state = params.get('state');
      var error = params.get('error');

      if (window.opener) {
        if (code && state) {
          window.opener.postMessage({ type: 'digilocker_callback', code: code, state: state }, '*');
        } else {
          window.opener.postMessage({ type: 'digilocker_callback', error: error || 'cancelled' }, '*');
        }
        setTimeout(function() { window.close(); }, 500);
      } else {
        document.getElementById('msg').textContent = 'You can close this window.';
      }
    })();
  </script>
</body>
</html>
